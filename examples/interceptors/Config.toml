[application]
name = "sword-interceptors-example"
graceful-shutdown = false

[web]
host = "0.0.0.0"
port = 8081
body-limit = "5MB"
request-timeout = { enabled = true, timeout = "15s" }

[socketio]
parser = "common"
transports = ["websocket", "polling"]

[cors]
allow-origins = ["*"]
allow-methods = ["GET", "POST", "PUT", "DELETE"]

[tracing]
enabled = true
filter = "info,sword=info"
format = "dev"
time-style = "none"
time-pattern = "%H:%M:%S"
with-fields = []
