[application]
name = "REST Adapter Example"
host = "0.0.0.0"
port = 8081
graceful-shutdown = false

[application.request-timeout]
enabled = true
timeout = "15s"
display = true

[application.body-limit]
max-size = "5MB"
display = true

[tracing]
enabled = true
default-filter = "info,sword=info"
format = "pretty"
ansi = false
timer = false
with-fields = []

[database]
uri = "${POSTGRES_DATABASE_URL}"
migrations_path = "config/migrations"

[hasher]
cost = 12
