[application]
name = "SocketIO Adapter Example"
graceful-shutdown = false

[web]
host = "0.0.0.0"
port = 8081
request-timeout = { enabled = true, timeout = "15s", display = true }
body-limit = { enabled = true, max-size = "5MB", display = true }

[socketio]
enabled = true
parser = "common"
transports = ["websocket", "polling"]

[tracing]
enabled = true
default-filter = "info,sword=info"
format = "pretty"
time-style = "none"
with-fields = []
