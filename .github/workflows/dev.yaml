name: Dev Checks

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - ".editorconfig"
      - "README.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/workflows/**"
      - "*.md"
      - ".vscode/**"
      - ".zed/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - ".editorconfig"
      - "README.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/workflows/**"
      - "*.md"
      - ".vscode/**"
      - ".zed/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (sword)
        run: cargo clippy -p sword --all-targets -- -D warnings

      - name: Run clippy (sword-web)
        run: cargo clippy -p sword-web --all-targets --all-features -- -D warnings

      - name: Run clippy (sword-socketio)
        run: cargo clippy -p sword-socketio --all-targets --all-features -- -D warnings

      - name: Run clippy (sword-grpc)
        run: cargo clippy -p sword-grpc --all-targets --all-features -- -D warnings

      - name: Run tests (web)
        run: cargo test -p sword-web-tests

      - name: Run tests (socketio)
        run: cargo test -p sword-socketio-tests

      - name: Run tests (grpc)
        run: cargo test -p sword-grpc-tests -- --test-threads=1

      - name: Build docs (sword)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p sword --no-deps

      - name: Build docs (sword-web)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p sword-web --no-deps --all-features

      - name: Build docs (sword-socketio)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p sword-socketio --no-deps --all-features

      - name: Build docs (sword-grpc)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p sword-grpc --no-deps --all-features
