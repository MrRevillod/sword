name: Dev Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        toolchain: [stable, "1.85.0"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (web/socketio set)
        run: cargo clippy --workspace --exclude grpc-controllers --all-targets --all-features -- -D warnings

      - name: Check web/socketio feature set
        run: cargo check --workspace --exclude grpc-controllers

      - name: Run tests (all except grpc example)
        run: cargo test --workspace --exclude grpc-controllers

      - name: Check gRPC engine feature set
        run: cargo check -p sword --no-default-features --features grpc-controllers

      - name: Check gRPC example
        run: cargo check -p grpc-controllers

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --exclude grpc-controllers --no-deps --all-features
